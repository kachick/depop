name: CI
on:
  push:
    branches: [main]
    tags: ['v*.*.*']
    paths:
      - '.github/workflows/ci.yml'
      - '.github/workflows/release.yml'
      - '*.nix'
      - 'flake.*'
      - 'deno.jsonc'
      - '**.css'
      - '**.ts'
      - '**/manifest.json'
  pull_request:
    paths:
      - '.github/workflows/ci.yml'
      - '.github/workflows/release.yml'
      - '*.nix'
      - 'flake.*'
      - 'deno.jsonc'
      - '**.css'
      - '**.ts'
      - '**/manifest.json'
  schedule:
    # Every 10:42 JST
    # https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#schedule
    - cron: '42 1 * * *'
  workflow_dispatch:

jobs:
  nix:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@96951a368ba55167b55f1c916f7d416bac6505fe # v31.10.3
      - run: nix flake check

  check:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@96951a368ba55167b55f1c916f7d416bac6505fe # v31.10.3
      - run: nix develop --command deno task check

  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    outputs:
      chrome_artifact_name: ${{ fromJson(steps.build.outputs.report).chrome.productBasename }}
      firefox_artifact_name: ${{ fromJson(steps.build.outputs.report).firefox.productBasename }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@96951a368ba55167b55f1c916f7d416bac6505fe # v31.10.3
      - run: nix develop --command deno task check
      - name: Build
        id: build
        run: |
          tempfile="$(mktemp report.XXXX.json)"
          # Don't use subprocess when getting the result, it makes not easy to get the error messages
          nix develop --command deno task build >"$tempfile"
          printf "report<<JSON\n%s\nJSON\n" "$(<"$tempfile")" | tee --append "$GITHUB_OUTPUT"

      - name: Upload the chrome product
        uses: actions/upload-artifact@v7
        with:
          name: '${{ fromJson(steps.build.outputs.report).chrome.productBasename }}'
          path: '${{ fromJson(steps.build.outputs.report).chrome.productPath }}'
          archive: false
          if-no-files-found: error

      - name: Upload the firefox product
        uses: actions/upload-artifact@v7
        with:
          name: '${{ fromJson(steps.build.outputs.report).firefox.productBasename }}'
          path: '${{ fromJson(steps.build.outputs.report).firefox.productPath }}'
          archive: false
          if-no-files-found: error

  release:
    needs: [build]
    uses: ./.github/workflows/release.yml
    with:
      chrome_artifact_name: ${{ needs.build.outputs.chrome_artifact_name }}
      firefox_artifact_name: ${{ needs.build.outputs.firefox_artifact_name }}
    permissions:
      contents: write
