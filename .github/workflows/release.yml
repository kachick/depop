name: 🚀
on:
  workflow_call:

jobs:
  release:
    # https://github.com/softprops/action-gh-release/issues/236#issuecomment-1150530128
    permissions:
      contents: write
    timeout-minutes: 20
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: 'depop-*.zip'
          path: .

      - name: List and verify artifacts
        run: |
          ls -R
          # Search for depop-*.zip in the entire workspace
          if [ -z "$(find . -name "depop-*.zip" -print -quit)" ]; then
            echo "::error::No depop-*.zip artifacts found in the workspace. Integration failed."
            exit 1
          fi

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use find to pick up zips from any location (expected dist/*.zip)
          # Use xargs to handle potential multiple zips
          find . -name "depop-*.zip" | xargs gh release create "$GITHUB_REF_NAME" --generate-notes
