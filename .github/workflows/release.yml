name: 🚀
on:
  workflow_call:
    inputs:
      chrome_artifact:
        required: true
        type: string
      firefox_artifact:
        required: true
        type: string

jobs:
  release:
    # https://github.com/softprops/action-gh-release/issues/236#issuecomment-1150530128
    permissions:
      contents: write
    timeout-minutes: 20
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Download Chrome artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.chrome_artifact }}
          path: dist/

      - name: Download Firefox artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.firefox_artifact }}
          path: dist/

      - name: List and verify artifacts
        run: |
          ls -R dist/
          if [ ! -f "dist/${{ inputs.chrome_artifact }}" ]; then
            echo "::error::Chrome artifact dist/${{ inputs.chrome_artifact }} not found."
            exit 1
          fi
          if [ ! -f "dist/${{ inputs.firefox_artifact }}" ]; then
            echo "::error::Firefox artifact dist/${{ inputs.firefox_artifact }} not found."
            exit 1
          fi

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "dist/${{ inputs.chrome_artifact }}" \
            "dist/${{ inputs.firefox_artifact }}" \
            --generate-notes
