name: 🚀
on:
  workflow_call:
    inputs:
      chrome_artifact_name:
        required: true
        type: string
      firefox_artifact_name:
        required: true
        type: string
      chrome_zip_basename:
        required: true
        type: string
      firefox_zip_basename:
        required: true
        type: string

jobs:
  release:
    # https://github.com/softprops/action-gh-release/issues/236#issuecomment-1150530128
    permissions:
      contents: write
    timeout-minutes: 20
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Download Chrome artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.chrome_artifact_name }}
          path: .

      - name: Download Firefox artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.firefox_artifact_name }}
          path: .

      - name: Locate and verify artifacts
        id: locate
        run: |
          echo "--- Current directory structure ---"
          find . -maxdepth 4 -not -path '*/.*'

          # Find the actual path of the zip files (likely dist/depop-*.zip)
          CHROME_PATH=$(find . -name "${{ inputs.chrome_zip_basename }}" -print -quit)
          FIREFOX_PATH=$(find . -name "${{ inputs.firefox_zip_basename }}" -print -quit)

          if [ -z "$CHROME_PATH" ]; then
            echo "::error::Chrome ZIP ${{ inputs.chrome_zip_basename }} not found."
            exit 1
          fi
          if [ -z "$FIREFOX_PATH" ]; then
            echo "::error::Firefox ZIP ${{ inputs.firefox_zip_basename }} not found."
            exit 1
          fi

          echo "chrome_path=$CHROME_PATH" >> "$GITHUB_OUTPUT"
          echo "firefox_path=$FIREFOX_PATH" >> "$GITHUB_OUTPUT"

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "${{ steps.locate.outputs.chrome_path }}" \
            "${{ steps.locate.outputs.firefox_path }}" \
            --generate-notes
