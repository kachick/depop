name: 🚀
on:
  workflow_call:
    inputs:
      chrome_artifact_name:
        required: true
        type: string
      firefox_artifact_name:
        required: true
        type: string

jobs:
  release:
    # https://github.com/softprops/action-gh-release/issues/236#issuecomment-1150530128
    permissions:
      contents: write
    timeout-minutes: 20
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Download Chrome artifact
        id: download_chrome
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.chrome_artifact_name }}

      - name: Download Firefox artifact
        id: download_firefox
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.firefox_artifact_name }}

      - name: Verify artifacts
        run: |
          echo "Chrome path: ${{ steps.download_chrome.outputs.download-path }}"
          echo "Firefox path: ${{ steps.download_firefox.outputs.download-path }}"

          # archive: false results in the file being at the download-path directly
          # or within a directory named after the artifact.
          # We check both for robustness with actions/download-artifact@v8 behavior.
          if [ ! -f "${{ steps.download_chrome.outputs.download-path }}/${{ inputs.chrome_artifact_name }}" ]; then
            echo "::error::Chrome artifact not found at expected path."
            ls -R "${{ steps.download_chrome.outputs.download-path }}"
            exit 1
          fi
          if [ ! -f "${{ steps.download_firefox.outputs.download-path }}/${{ inputs.firefox_artifact_name }}" ]; then
            echo "::error::Firefox artifact not found at expected path."
            ls -R "${{ steps.download_firefox.outputs.download-path }}"
            exit 1
          fi

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "${{ steps.download_chrome.outputs.download-path }}/${{ inputs.chrome_artifact_name }}" \
            "${{ steps.download_firefox.outputs.download-path }}/${{ inputs.firefox_artifact_name }}" \
            --generate-notes
