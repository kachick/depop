name: 🚀
on:
  workflow_call:

jobs:
  release:
    # https://github.com/softprops/action-gh-release/issues/236#issuecomment-1150530128
    permissions:
      contents: write
    timeout-minutes: 20
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: 'depop-*.zip'
          merge-multiple: true
          path: dist/

      - name: List and verify artifacts
        run: |
          ls -R dist/
          # Ensure at least one zip file exists in dist/ (recursive check)
          if [ -z "$(find dist/ -name "*.zip" -print -quit)" ]; then
            echo "::error::No zip artifacts found in dist/ directory. Integration failed."
            exit 1
          fi

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/*.zip --generate-notes
