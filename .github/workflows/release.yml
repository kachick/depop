name: 🚀
on:
  workflow_call:
    inputs:
      chrome_artifact_name:
        required: true
        type: string
      firefox_artifact_name:
        required: true
        type: string

jobs:
  release:
    # https://github.com/softprops/action-gh-release/issues/236#issuecomment-1150530128
    permissions:
      contents: write
    timeout-minutes: 20
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Download Chrome artifact
        id: download_chrome
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.chrome_artifact_name }}
          skip-decompress: true

      - name: Download Firefox artifact
        id: download_firefox
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.firefox_artifact_name }}
          skip-decompress: true

      - name: Verify artifacts
        run: |
          test -f "${{ steps.download_chrome.outputs.download-path }}/${{ inputs.chrome_artifact_name }}"
          test -f "${{ steps.download_firefox.outputs.download-path }}/${{ inputs.firefox_artifact_name }}"

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "${{ steps.download_chrome.outputs.download-path }}/${{ inputs.chrome_artifact_name }}" \
            "${{ steps.download_firefox.outputs.download-path }}/${{ inputs.firefox_artifact_name }}" \
            --generate-notes
