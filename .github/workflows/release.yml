name: 🚀
on:
  workflow_call:
    inputs:
      chrome_artifact:
        required: true
        type: string
      firefox_artifact:
        required: true
        type: string

jobs:
  release:
    # https://github.com/softprops/action-gh-release/issues/236#issuecomment-1150530128
    permissions:
      contents: write
    timeout-minutes: 20
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Download Chrome artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.chrome_artifact }}
          path: .

      - name: Download Firefox artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.firefox_artifact }}
          path: .

      - name: Debug and verify artifacts
        id: verify
        run: |
          echo "--- Current directory structure ---"
          find . -maxdepth 4 -not -path '*/.*'
          
          echo "--- Searching for artifacts ---"
          # Find the actual path of the zip files
          CHROME_ZIP=$(find . -name "${{ inputs.chrome_artifact }}" -print -quit)
          FIREFOX_ZIP=$(find . -name "${{ inputs.firefox_artifact }}" -print -quit)
          
          if [ -z "$CHROME_ZIP" ]; then
            echo "::error::Chrome artifact ${{ inputs.chrome_artifact }} not found anywhere."
            exit 1
          fi
          if [ -z "$FIREFOX_ZIP" ]; then
            echo "::error::Firefox artifact ${{ inputs.firefox_artifact }} not found anywhere."
            exit 1
          fi
          
          echo "found_chrome_zip=$CHROME_ZIP" >> "$GITHUB_OUTPUT"
          echo "found_firefox_zip=$FIREFOX_ZIP" >> "$GITHUB_OUTPUT"

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "${{ steps.verify.outputs.found_chrome_zip }}" \
            "${{ steps.verify.outputs.found_firefox_zip }}" \
            --generate-notes
