name: 🚀
on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  pull_request:
    paths:
      - '.github/workflows/release.yml'
      - '.github/workflows/ci.yml'
      - 'deno.jsonc'
      - 'deno.lock'
      - 'scripts/build.ts'
      - 'src/**'
      - 'assets/**'
      - 'vendor/**'
  workflow_dispatch:

jobs:
  release:
    # https://github.com/softprops/action-gh-release/issues/236#issuecomment-1150530128
    permissions:
      contents: write
    timeout-minutes: 20
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Wait other jobs
        uses: kachick/wait-other-jobs@v4
        with:
          skip-same-workflow: 'true'
          skip-list: |
            [
              {
                "workflowFile": "merge-bot-pr.yml"
              }
            ]

      - name: Download artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist
          # Find the CI run ID for the current commit
          run_id=$(gh run list --workflow CI --commit "$GITHUB_SHA" --json databaseId,status -q '.[] | select(.status == "completed" or .status == "success") | .databaseId' | head -n 1)

          if [ -z "$run_id" ]; then
            echo "::error::Could not find a completed CI run for commit $GITHUB_SHA"
            exit 1
          fi

          # Download artifacts named 'depop-*.zip' (defined in ci.yml)
          gh run download "$run_id" --pattern "depop-*.zip" --dir dist/

      - name: List and verify artifacts
        run: |
          ls -R dist/
          # Ensure at least one zip file exists in dist/ (recursive check)
          if [ -z "$(find dist/ -name "*.zip" -print -quit)" ]; then
            echo "::error::No zip artifacts found in dist/ directory. Integration failed."
            exit 1
          fi

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/*.zip --generate-notes
