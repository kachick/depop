name: 🚀
on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  pull_request:
    paths:
      - '.github/workflows/release.yml'
      - 'deno.jsonc'
      - 'deno.lock'
      - 'scripts/build.ts'
      - 'src/**'
      - 'assets/**'
      - 'vendor/**'
  workflow_dispatch:

jobs:
  release:
    # https://github.com/softprops/action-gh-release/issues/236#issuecomment-1150530128
    permissions:
      contents: write
    timeout-minutes: 20
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: denoland/setup-deno@v2
        with:
          deno-version: '2.6.9' # selfup {"extract":"\\d[^']+","replacer":["bash","-c","deno --version | head -n 1 | cut -d ' ' -f 2"]}
      - name: Ensure cache before build
        run: deno task cache
      - name: Build
        id: build
        run: |
          echo "report<<JSON" >> "$GITHUB_OUTPUT"
          deno run --node-modules-dir --quiet --allow-net --allow-read --allow-write --allow-env --allow-run scripts/build.ts >> "$GITHUB_OUTPUT"
          echo "JSON" >> "$GITHUB_OUTPUT"
      - name: Wait other jobs
        uses: kachick/wait-other-jobs@v4
        with:
          skip-same-workflow: 'true'
          skip-list: |
            [
              {
                "workflowFile": "merge-bot-pr.yml"
              }
            ]
        if: startsWith(github.ref, 'refs/tags/')
      - name: Release
        # TODO: Replace with gh command
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ${{ fromJson(steps.build.outputs.report).chrome.productPath }}
            ${{ fromJson(steps.build.outputs.report).firefox.productPath }}
