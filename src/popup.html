<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link href="/primer.css" rel="stylesheet" />
    <link href="/popup.css" rel="stylesheet" />
  </head>
  <body>
    <div class="container">
      <div class="Box color-shadow-small">
        <div class="Box-header py-2 px-3">
          <h3 class="Box-title text-normal">depop</h3>
        </div>
        <div class="Box-body p-3">
          <div class="form-checkbox mt-0 mb-3">
            <label>
              <input type="checkbox" id="isEnabled" />
              <span class="text-bold">Enable depop</span>
            </label>
            <p class="note mb-0">Hide GitHub stats</p>
          </div>
          <button type="button" id="openOptions" class="btn btn-sm btn-block">
            Detailed Settings
          </button>
        </div>
      </div>
    </div>
    <script src="/popup.js"></script>
  </body>
</html>
